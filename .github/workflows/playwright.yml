name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      full_suite:
        description: Run the full live Playwright suite instead of the stable smoke suite
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Playwright Configuration
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Validate Playwright test graph
      run: npm run test:check

  smoke:
    name: Run Stable Smoke Suite
    needs: validate
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.full_suite != 'true' }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      EPUMP_URL: ${{ vars.EPUMP_URL }}
      EPUMP_EMAIL: ${{ secrets.EPUMP_EMAIL }}
      EPUMP_PASSWORD: ${{ secrets.EPUMP_PASSWORD }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Chrome
      run: npx playwright install --with-deps chrome
    - name: Run stable smoke suite
      run: npm run test:ci
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-smoke
        path: |
          playwright-report/
          test-results/
        retention-days: 30

  full-suite:
    name: Run Full Live Suite
    needs: validate
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.full_suite == 'true' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      EPUMP_URL: ${{ vars.EPUMP_URL }}
      EPUMP_EMAIL: ${{ secrets.EPUMP_EMAIL }}
      EPUMP_PASSWORD: ${{ secrets.EPUMP_PASSWORD }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Chrome
      run: npx playwright install --with-deps chrome
    - name: Run full live suite
      run: npm run test:ci:full
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-full-suite
        path: |
          playwright-report/
          test-results/
        retention-days: 30
