name: Playwright Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Run every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      run_load_tests:
        description: 'Run load simulation tests'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      EPUMP_URL: ${{ secrets.EPUMP_URL }}
      EPUMP_EMAIL: ${{ secrets.EPUMP_EMAIL }}
      EPUMP_PASSWORD: ${{ secrets.EPUMP_PASSWORD }}
      EPUMP_RUN_LOAD_TESTS: ${{ inputs.run_load_tests == 'true' && '1' || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chrome --with-deps

      - name: Run smoke tests
        if: github.event_name == 'pull_request'
        run: npx playwright test tests/01-login.spec.ts tests/14-BankValidation.spec.ts --project="Google Chrome"
        continue-on-error: false

      - name: Run all tests
        if: github.event_name != 'pull_request'
        run: npx playwright test --project="Google Chrome"
        continue-on-error: true
        id: run_tests

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: failure() || steps.run_tests.outcome == 'failure'
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

      - name: Fail if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
